  :root { --bg:#0a0a0f; --surface:#13131a; --border:rgba(255,255,255,0.07); --text:#f0eef8; --muted:#6b6880; --accent:#c084fc; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); height:100dvh; overflow:hidden; display:flex; flex-direction:column; max-width:430px; margin:0 auto; position:relative; }

  header { padding:14px 20px 12px; display:flex; align-items:center; justify-content:space-between; background:var(--bg); z-index:1000; border-bottom:1px solid var(--border); flex-shrink:0; }
  .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:20px; letter-spacing:-0.5px; }
  .logo span { color:var(--accent); }
  .live-badge { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); font-weight:500; letter-spacing:0.5px; text-transform:uppercase; }
  .live-dot { width:7px; height:7px; border-radius:50%; background:#34d399; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

  #map-wrap { flex:1; position:relative; overflow:hidden; }
  #map { width:100%; height:100%; }

  /* Dark map */
  .leaflet-tile { filter:brightness(0.55) invert(1) contrast(3) hue-rotate(200deg) saturate(0.25) brightness(0.65); }
  .leaflet-container { background:#0d0d14; }
  .leaflet-control-zoom a { background:var(--surface)!important; color:var(--text)!important; border-color:var(--border)!important; }
  .leaflet-control-zoom a:hover { background:#1f1f2e!important; }
  .leaflet-control-attribution { display:none; }

  /* Markers */
  .mood-marker { display:flex; flex-direction:column; align-items:center; cursor:pointer; }
  .mood-bubble { background:rgba(19,19,26,0.93); border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:5px 9px; display:flex; align-items:center; gap:4px; box-shadow:0 4px 16px rgba(0,0,0,0.5); white-space:nowrap; max-width:130px; backdrop-filter:blur(8px); transition:all 0.2s; }
  .mood-emoji { font-size:15px; }
  .mood-text { font-size:10px; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:90px; font-family:'DM Sans',sans-serif; display:none; }
  .mood-bubble.expanded .mood-text { display:block; }
  .mood-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
  .mood-tail { width:2px; height:6px; background:rgba(255,255,255,0.15); border-radius:2px; margin:0 auto; }
  .mood-pin { width:4px; height:4px; border-radius:50%; background:rgba(255,255,255,0.15); margin:0 auto; }

  /* Stats */
  #stats-bar { position:absolute; top:10px; left:12px; right:12px; display:flex; gap:8px; z-index:500; pointer-events:none; flex-wrap:wrap; }
  .stat-pill { background:rgba(10,10,15,0.88); backdrop-filter:blur(10px); border:1px solid var(--border); border-radius:20px; padding:6px 12px; font-size:11px; color:var(--muted); font-weight:500; display:flex; align-items:center; gap:5px; }
  .stat-pill strong { color:var(--text); font-weight:600; }

  /* REGION PANEL - slides up from bottom */
  #region-panel {
    position:absolute; bottom:0; left:0; right:0;
    background:var(--surface);
    border-radius:24px 24px 0 0;
    border-top:1px solid var(--border);
    padding:0 20px 24px;
    z-index:1800;
    transform:translateY(100%);
    transition:transform 0.4s cubic-bezier(0.32,0.72,0,1);
    max-height:55vh; overflow-y:auto;
  }
  #region-panel.open { transform:translateY(0); }
  .rp-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:12px auto 16px; }
  .rp-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
  .rp-city { font-family:'Syne',sans-serif; font-size:17px; font-weight:700; }
  .rp-close { font-size:20px; color:var(--muted); cursor:pointer; padding:4px; line-height:1; }
  .rp-count { font-size:12px; color:var(--muted); margin-bottom:14px; }
  .mood-bars { display:flex; flex-direction:column; gap:7px; }
  .mood-bar-row { display:flex; align-items:center; gap:8px; }
  .mood-bar-label { font-size:11px; width:74px; display:flex; align-items:center; gap:4px; }
  .mood-bar-track { flex:1; height:7px; background:rgba(255,255,255,0.06); border-radius:4px; overflow:hidden; }
  .mood-bar-fill { height:100%; border-radius:4px; transition:width 0.7s cubic-bezier(0.34,1.56,0.64,1); }
  .mood-bar-pct { font-size:11px; color:var(--muted); width:32px; text-align:right; }
  .dominant-badge { display:inline-flex; align-items:center; gap:5px; padding:5px 12px; border-radius:20px; font-size:11px; font-weight:600; margin-top:12px; }

  /* NEARBY NOTIF */
  #nearby-notif { position:absolute; bottom:90px; left:12px; right:12px; background:rgba(19,19,26,0.96); border:1px solid var(--accent); border-radius:20px; padding:12px 16px; z-index:1200; display:none; backdrop-filter:blur(12px); box-shadow:0 8px 32px rgba(192,132,252,0.2); }
  @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
  #nearby-notif.show { display:flex; align-items:center; gap:10px; animation:slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .notif-emoji { font-size:24px; }
  .notif-text { flex:1; font-size:13px; line-height:1.4; }
  .notif-text strong { color:var(--accent); }
  .notif-close { font-size:18px; color:var(--muted); cursor:pointer; padding:4px; }

  /* BOTTOM SHEET */
  #bottom-sheet { position:absolute; bottom:0; left:0; right:0; background:var(--surface); border-radius:24px 24px 0 0; border-top:1px solid var(--border); padding:0 20px 32px; z-index:2000; transform:translateY(100%); transition:transform 0.4s cubic-bezier(0.32,0.72,0,1); max-height:82dvh; overflow-y:auto; }
  #bottom-sheet.open { transform:translateY(0); }
  .sheet-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:12px auto 20px; }
  .sheet-title { font-family:'Syne',sans-serif; font-size:18px; font-weight:700; margin-bottom:6px; }
  .sheet-sub { font-size:13px; color:var(--muted); margin-bottom:20px; }
  .category-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:20px; }
  .cat-btn { background:var(--bg); border:2px solid var(--border); border-radius:16px; padding:12px 6px; display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; transition:all 0.2s; color:var(--text); }
  .cat-btn:hover { transform:scale(1.04); }
  .cat-btn.selected { border-color:currentColor; background:color-mix(in srgb, currentColor 15%, transparent); }
  .cat-emoji { font-size:22px; }
  .cat-label { font-size:10px; color:var(--muted); font-weight:500; }
  .cat-btn.selected .cat-label { color:currentColor; }
  .msg-label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; font-weight:500; }
  .msg-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:14px; padding:12px 16px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; resize:none; transition:border-color 0.2s; line-height:1.5; height:80px; }
  .msg-input::placeholder { color:var(--muted); }
  .msg-input:focus { border-color:var(--accent); }
  .emoji-row { display:flex; gap:8px; flex-wrap:wrap; margin:12px 0; }
  .emoji-pick { font-size:22px; cursor:pointer; padding:6px; border-radius:10px; transition:all 0.15s; border:2px solid transparent; background:var(--bg); }
  .emoji-pick:hover { transform:scale(1.2); }
  .emoji-pick.selected { border-color:var(--accent); background:rgba(192,132,252,0.1); }
  .submit-btn { width:100%; margin-top:16px; padding:16px; background:var(--accent); border:none; border-radius:16px; color:#fff; font-family:'Syne',sans-serif; font-size:16px; font-weight:700; cursor:pointer; transition:all 0.2s; }
  .submit-btn:disabled { opacity:0.4; cursor:not-allowed; }

  #fab { position:absolute; bottom:24px; right:20px; width:56px; height:56px; border-radius:18px; background:var(--accent); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:24px; box-shadow:0 8px 32px rgba(192,132,252,0.4); z-index:1500; transition:all 0.2s; color:white; }
  #fab.active { transform:rotate(45deg); background:#ef4444; box-shadow:0 8px 32px rgba(239,68,68,0.4); }

  #toast { position:absolute; top:60px; left:50%; transform:translateX(-50%) translateY(-20px); background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:10px 18px; font-size:13px; font-weight:500; opacity:0; transition:all 0.3s; z-index:3000; white-space:nowrap; pointer-events:none; }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  #overlay { position:absolute; inset:0; background:rgba(0,0,0,0.5); z-index:1900; opacity:0; pointer-events:none; transition:opacity 0.3s; }
  #overlay.show { opacity:1; pointer-events:all; }

  #region-panel::-webkit-scrollbar { width:3px; }
  #region-panel::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  #bottom-sheet::-webkit-scrollbar { width:3px; }
  #bottom-sheet::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

function getDistance(lat1,lng1,lat2,lng2) {
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

async function getLocationName(lat,lng) {
  try {
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=tr`);
    const d=await r.json();
    return d.address?.city||d.address?.town||d.address?.village||d.address?.county||d.address?.state||'Bilinmeyen';
  } catch(e){ return 'Bilinmeyen'; }
}

async function getCountryName(lat,lng) {
  try {
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=tr`);
    const d=await r.json();
    return d.address?.country||'Bilinmeyen';
  } catch(e){ return 'Bilinmeyen'; }
}

function hexToRgb(hex) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

// ── MARKERS ───────────────────────────────────────────────
function createMarkerIcon(mood) {
  const cat=CATEGORIES.find(c=>c.id===mood.cat_id);
  const color=cat?cat.color:'#fff';
  const emoji=mood.emoji||cat?.emoji||'😶';
  const text=mood.message?`<span class="mood-text">${mood.message}</span>`:'';
  return L.divIcon({
    html:`<div class="mood-marker"><div class="mood-bubble"><div class="mood-dot" style="background:${color}"></div><span class="mood-emoji">${emoji}</span>${text}</div><div class="mood-tail"></div><div class="mood-pin"></div></div>`,
    className:'', iconAnchor:[0,0], iconSize:null
  });
}

function addMarkerToMap(mood) {
  if(leafletMarkers[mood.id]) return;
  const marker=L.marker([mood.lat,mood.lng],{icon:createMarkerIcon(mood)}).addTo(map);
  marker.on('click',function(e){
    L.DomEvent.stopPropagation(e);
    document.querySelectorAll('.mood-bubble.expanded').forEach(b=>b.classList.remove('expanded'));
    const bubble=this.getElement()?.querySelector('.mood-bubble');
    if(bubble) bubble.classList.add('expanded');
  });
  leafletMarkers[mood.id]=marker;
}

function removeOldMarkers(ids) {
  Object.keys(leafletMarkers).forEach(id=>{
    if(!ids.includes(id)){map.removeLayer(leafletMarkers[id]);delete leafletMarkers[id];}
  });
}

// ── REGION PANEL ──────────────────────────────────────────
map.on('click',async function(e) {
  document.querySelectorAll('.mood-bubble.expanded').forEach(b=>b.classList.remove('expanded'));
  if(regionOpen) { closeRegionPanel(); return; }

  const {lat,lng}=e.latlng;
  const zoom=map.getZoom();

  // Zoom'a göre yarıçap
  const RADIUS = zoom<4 ? 2000 : zoom<6 ? 800 : zoom<8 ? 300 : zoom<11 ? 80 : zoom<13 ? 25 : 10;
  const nearby=allMoods.filter(m=>getDistance(lat,lng,m.lat,m.lng)<=RADIUS);
  if(nearby.length===0) return;

  // Uzakta ülke adı, yakında şehir adı göster
  let locationName;
  if(zoom<7) {
    locationName = await getCountryName(lat,lng);
  } else {
    locationName = await getLocationName(lat,lng);
  }
  showRegionPanel(locationName, nearby);
});

function showRegionPanel(cityName, moods) {
  const total=moods.length;
  const counts={};
  moods.forEach(m=>{counts[m.cat_id]=(counts[m.cat_id]||0)+1;});
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const dominant=CATEGORIES.find(c=>c.id===sorted[0]?.[0]);

  document.getElementById('rp-city').textContent='📍 '+cityName;
  document.getElementById('rp-count').textContent=`${total} ${T.lastHour}`;

  const bars=CATEGORIES.map(cat=>{
    const count=counts[cat.id]||0;
    if(count===0) return '';
    const pct=Math.round(count/total*100);
    return `<div class="mood-bar-row">
      <div class="mood-bar-label">${cat.emoji} ${cat.label}</div>
      <div class="mood-bar-track"><div class="mood-bar-fill" style="width:0%;background:${cat.color}" data-pct="${pct}"></div></div>
      <div class="mood-bar-pct">${pct}%</div>
    </div>`;
  }).join('');

  document.getElementById('rp-bars').innerHTML=bars;
  document.getElementById('rp-badge').innerHTML=dominant
    ?`<div class="dominant-badge" style="background:color-mix(in srgb,${dominant.color} 15%,transparent);color:${dominant.color}">${dominant.emoji} ${T.dominant}: ${dominant.label}</div>`:'';

  document.getElementById('region-panel').classList.add('open');
  regionOpen=true;

  // Animate bars
  setTimeout(()=>{
    document.querySelectorAll('.mood-bar-fill').forEach(el=>{
      el.style.width=el.dataset.pct+'%';
    });
  },50);
}

function closeRegionPanel() {
  document.getElementById('region-panel').classList.remove('open');
  regionOpen=false;
}
document.getElementById('rp-close').onclick=closeRegionPanel;

// ── LOAD ──────────────────────────────────────────────────
function updateStats(moods) {
  document.getElementById('count-stat').textContent=moods.length;
  if(moods.length>0){
    const counts={};moods.forEach(m=>{counts[m.cat_id]=(counts[m.cat_id]||0)+1;});
    const top=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
    const cat=CATEGORIES.find(c=>c.id===top[0]);
    if(cat) document.getElementById('top-mood-pill').innerHTML=`${cat.emoji} ${cat.label}`;
    // Dünya duygu skoru
    updateWorldScore(counts, moods.length);
  }
}

function updateWorldScore(counts, total) {
  const positive = ['happy','calm','excited','love'];
  const posCount = positive.reduce((s,id)=>s+(counts[id]||0),0);
  const pct = total>0 ? Math.round(posCount/total*100) : 0;
  const dominant = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
  const cat = CATEGORIES.find(c=>c.id===dominant?.[0]);
  const scoreEl = document.getElementById('world-score');
  if(scoreEl && cat) {
    scoreEl.innerHTML = `🌍 <strong style="color:var(--text)">${pct}%</strong> <span style="color:${cat.color}">${cat.emoji}</span>`;
    scoreEl.title = `Dünyada ${pct}% pozitif duygu • En çok: ${cat.label}`;
  }
}

async function loadMoods() {
  const since=new Date(Date.now()-EXPIRY_MS).toISOString();
  const {data,error}=await db.from('moods').select('*').gte('created_at',since).order('created_at',{ascending:false}).limit(200);
  if(error){console.error(error);return;}
  allMoods=data||[];
  const ids=allMoods.map(m=>m.id);
  removeOldMarkers(ids);
  allMoods.forEach(addMarkerToMap);
  drawHeatmap(allMoods);
  updateStats(allMoods);
}

function subscribeRealtime() {
  db.channel('moods-realtime')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'moods'},payload=>{
      allMoods.unshift(payload.new);
      if(allMoods.length>200) allMoods.pop();
      addMarkerToMap(payload.new);
      drawHeatmap(allMoods);
      updateStats(allMoods);
      const cat=CATEGORIES.find(c=>c.id===payload.new.cat_id);
      if(cat) showToast(`${cat.emoji} ${T.shared}`);
    })
    .subscribe();
}

// ── NEARBY ────────────────────────────────────────────────
function checkNearby(userLat,userLng,catId) {
  const cat=CATEGORIES.find(c=>c.id===catId);
  if(!cat) return;
  const since=Date.now()-EXPIRY_MS;
  const nearby=allMoods.filter(m=>{
    if(m.cat_id!==catId) return false;
    if(new Date(m.created_at).getTime()<since) return false;
    return getDistance(userLat,userLng,m.lat,m.lng)<=NEARBY_KM;
  });
  if(nearby.length>0){
    document.getElementById('notif-emoji').textContent=cat.emoji;
    document.getElementById('notif-text').innerHTML=`${T.nearby} <strong>${nearby.length} ${T.people}</strong> ${T.alsoFeels}`;
    document.getElementById('nearby-notif').classList.add('show');
    setTimeout(()=>document.getElementById('nearby-notif').classList.remove('show'),6000);
  }
}

// ── SUBMIT ────────────────────────────────────────────────
document.getElementById('submit-btn').onclick=async()=>{
  if(!selectedCat){showToast(T.selectCatWarn);return;}
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent=T.saving;

  const doInsert=async(lat,lng)=>{
    const cat=CATEGORIES.find(c=>c.id===selectedCat);
    const cityName=await getLocationName(lat,lng);
    const {error}=await db.from('moods').insert({
      lat,lng,cat_id:selectedCat,
      emoji:selectedEmoji||cat.emoji,
      message:document.getElementById('mood-text').value.trim().slice(0,60)||null,
      city_name:cityName,
    });
    btn.disabled=false;btn.textContent='Paylaş 🚀';
    if(error){showToast('❌ '+T.error);console.error(error);return;}
    closeSheet();
    showToast(`${cat.emoji} ${T.shared}`);
    checkNearby(lat,lng,selectedCat);
    selectedCat=null;selectedEmoji=null;
    document.querySelectorAll('.cat-btn,.emoji-pick').forEach(b=>b.classList.remove('selected'));
    document.getElementById('mood-text').value='';
  };

  navigator.geolocation.getCurrentPosition(
    pos=>doInsert(pos.coords.latitude,pos.coords.longitude),
    ()=>{doInsert(20+Math.random()*50,10+Math.random()*60);}
  );
};

function applyTranslations() {
  // HTML elements
  const el = id => document.getElementById(id);
  if(el('live-text')) el('live-text').textContent = T.live;
  if(el('sheet-title')) el('sheet-title').textContent = T.howFeel;
  if(el('sheet-sub')) el('sheet-sub').textContent = T.anonymous;
  if(el('cat-label')) el('cat-label').textContent = T.selectCat;
  if(el('emoji-label')) el('emoji-label').textContent = T.selectEmoji;
  if(el('feel-label')) el('feel-label').textContent = T.whatFeel;
  if(el('people-text')) el('people-text').textContent = T.people;
  if(el('mood-text')) el('mood-text').placeholder = T.placeholder;
  if(el('submit-btn')) el('submit-btn').textContent = T.share;
  // RTL for Arabic
  if(LANG === 'ar') document.body.style.direction = 'rtl';
}

function buildCategories(){
  const grid=document.getElementById('cat-grid');
  CATEGORIES.forEach(cat=>{
    const btn=document.createElement('button');btn.className='cat-btn';btn.style.color=cat.color;
    btn.innerHTML=`<span class="cat-emoji">${cat.emoji}</span><span class="cat-label">${cat.label}</span>`;
    btn.onclick=()=>{document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');selectedCat=cat.id;};
    grid.appendChild(btn);
  });
}
function buildEmojis(){
  const row=document.getElementById('emoji-row');
  EMOJIS.forEach(e=>{
    const btn=document.createElement('button');btn.className='emoji-pick';btn.textContent=e;
    btn.onclick=()=>{document.querySelectorAll('.emoji-pick').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');selectedEmoji=e;};
    row.appendChild(btn);
  });
}

function openSheet(){
  sheetOpen=true;
  document.getElementById('bottom-sheet').classList.add('open');
  document.getElementById('overlay').classList.add('show');
  document.getElementById('fab').classList.add('active');
  document.getElementById('fab').textContent='✕';
  map.dragging.disable();
  closeRegionPanel();
}
function closeSheet(){
  sheetOpen=false;
  document.getElementById('bottom-sheet').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('fab').classList.remove('active');
  document.getElementById('fab').textContent='＋';
  map.dragging.enable();
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

document.getElementById('fab').onclick=()=>sheetOpen?closeSheet():openSheet();
document.getElementById('overlay').onclick=closeSheet;

applyTranslations();
buildCategories();
buildEmojis();
loadMoods();
subscribeRealtime();
setInterval(loadMoods,60*1000);
